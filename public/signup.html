
<!doctype html>
<html lang="en">
  <head>

     <!--Import Google Icon Font-->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- Compiled and minified CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <!--Let browser know website is optimized for mobile-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Signup</title>

    <style>
      *{
        box-sizing: border-box;  
      }

      html{
        height: 100vh;
        width: 100vw;
        margin:0;
        padding:0;
      }

      body{
        margin:0;
        padding:0;
        height: 100%;
        width: 100%;
      }

    </style>

  </head>
  <body>
    <nav class="purple">
      <div class="nav-wrapper" style="padding-left: 20px; padding-right: 20px;">
        <ul class="left">
          <li><a href="/">Home</a></li>
        </ul>
  
        <a href="#" class="brand-logo">SignUp <span id="user"></span></a>
        <ul class="right">
          <li>
            <button class="btn waves-effect waves-light" id="logoutBtn" style="display: none">
              Logout
            </button>
          </li>
          <li>
            <a href="signup.html">
              Signup
            </a>
          </li>
          <li>
            <a href="login.html">
              Login
            </a>
          </li>
        </ul>
       
      </div>
    </nav>

    <main class="container">
        <div class="row">
          <form id="myform"class="col s12">
            <div class="row">
              <div class="input-field col s12">
                <input id="email" name="email" type="email" class="validate" required>
                <label for="email">Email</label>
              </div>
              <div class="input-field col s12">
                <input id="password" name="password" type="password" class="validate" required>
                <label for="password">Password</label>
              </div>
            </div>
            <div class="row center-align">
              <button class="btn waves-effect waves-light" type="submit" name="action">
                Sign Up
              </button>
            </div>
          </form>
        </div>
      </main>
      

    <script type="module">
        import { signIn, logout, auth, setAuthListeners, createUser } from './auth.js';

        async function signup(event){
            
            event.preventDefault();

            const form = event.target;
            const formData = new FormData(form);//get form data
            const data = Object.fromEntries(formData);

            try {
                const userCredential = await createUser(data.email, data.password);
                console.log("User signed up:", userCredential);
                M.toast({ html: 'Signup successful!', classes: 'green' });
                // Redirect to login page or perform any other action
                // window.location.href = 'login.html';
            } catch (error) {
                console.error("Signup error:", error.message);
                M.toast({ html: `Error: ${error.message}`, classes: 'red' });
            }
        }

  // Handle form submission
    document.querySelector('form').addEventListener('submit', signup);


    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script> M.AutoInit(); </script>
  </body>
</html>
